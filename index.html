<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20242e"/>
      <stop offset="0.55" stop-color="#141720"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#e0405a" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#e0405a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#e0405a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eceae4"/>
    </linearGradient>
    <linearGradient id="curl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5c74"/>
      <stop offset="0.55" stop-color="#e0405a"/>
      <stop offset="1" stop-color="#8f2a39"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe3ec"/>
      <stop offset="1" stop-color="#c7cdda"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 背景（フルブリード：iOS/Androidのマスクに対応） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- ページ本体 -->
  <g filter="url(#soft)">
    <rect x="306" y="236" width="412" height="552" rx="30" fill="url(#page)" stroke="#0f1219" stroke-width="10"/>
  </g>

  <!-- コマ割り（マンガらしさ） -->
  <g stroke="#0f1219" stroke-width="9">
    <rect x="344" y="272" width="336" height="182" rx="8" fill="url(#panel)"/>
    <rect x="344" y="470" width="158" height="168" rx="8" fill="#ffffff"/>
    <rect x="522" y="470" width="158" height="168" rx="8" fill="url(#panel)"/>
    <rect x="344" y="654" width="336" height="100" rx="8" fill="#ffffff"/>
  </g>

  <!-- 吹き出し -->
  <g>
    <ellipse cx="436" cy="352" rx="74" ry="50" fill="#ffffff" stroke="#0f1219" stroke-width="9"/>
    <path d="M395 392 L378 430 L430 398 Z" fill="#ffffff" stroke="#0f1219" stroke-width="9" stroke-linejoin="round"/>
    <circle cx="412" cy="352" r="9" fill="#e0405a"/>
    <circle cx="448" cy="352" r="9" fill="#e0405a"/>
    <circle cx="484" cy="352" r="9" fill="#e0405a"/>
  </g>

  <!-- 影：めくれた角が落とす影 -->
  <path d="M306 690 L306 788 L214 788 Z" fill="#000000" opacity="0.22"/>

  <!-- めくれる角（紙のカール・朱赤の裏面） -->
  <path d="M306 690 Q300 754 322 776 Q346 800 402 792 L306 690 Z" fill="url(#curl)"/>
  <!-- 稜線ハイライト -->
  <path d="M306 690 L402 792" fill="none" stroke="#ffd6dd" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
</svg>
